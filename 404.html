<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Hephestos</title>
    <!--
      GitHub Pages SPA fallback (spa-github-pages technique).
      GitHub serves this file for any unknown path. It rewrites the URL into a
      query string and redirects to index.html, which restores the real path
      (see the matching script in index.html) so React Router can handle it.
      pathSegmentsToKeep = 1 keeps the "/hephestos-website" project sub-path.
    -->
    <script type="text/javascript">
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
